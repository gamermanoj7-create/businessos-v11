<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BusinessOS - Barcode & QR</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>📦 Barcode & QR Management</h1>

<p>Generate and Manage Product Barcodes</p>

<hr>

<form id="barcodeForm">

<select
id="barcodeProduct"
required>

<option value="">
📦 Select Product
</option>

</select>

<select
id="labelSize">

<option value="25x15 mm">
🏷️ 25 × 15 mm
</option>

<option value="40x20 mm">
🏷️ 40 × 20 mm
</option>

<option value="50x25 mm">
🏷️ 50 × 25 mm
</option>

<option value="100x50 mm">
🏷️ 100 × 50 mm
</option>

</select>

<br><br>

<button
type="submit"
class="success-btn">

📦 Generate Barcode

</button>

</form>

<hr>

<h2>📦 Barcode List</h2>

<input
type="text"
id="searchBarcode"
class="search-box"
placeholder="🔍 Search Barcode"
onkeyup="searchBarcode()">

<br><br>

<h3>

📦 Total Barcodes :
<span id="totalBarcodes">0</span>

</h3>

<br>

<div id="barcodeTable">

<div class="list-card">

<h3>📦 No Barcode Found</h3>

<p>Generate your first Barcode.</p>

</div>

</div>

<hr>

<div class="button-group">

<button
type="button"
class="primary-btn"
onclick="refreshBarcodes()">

🔄 Refresh

</button>

<button
type="button"
class="primary-btn"
onclick="location.href='products.html'">

📦 Products

</button>

<button
type="button"
class="primary-btn"
onclick="location.href='inventory.html'">

📦 Inventory

</button>

<button
type="button"
class="primary-btn"
onclick="location.href='reports.html'">

📊 Reports

</button>

<button
type="button"
class="success-btn"
onclick="location.href='index.html'">

🏠 Dashboard

</button>

</div>

</div>

<script src="common.js"></script>
<script src="barcode.js"></script>

</body>

</html>
