<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BusinessOS V13 | Customer Management</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="login-card">

<h1>👥 Customer Management</h1>

<p>BusinessOS V13 CRM Module</p>

<hr>

<form id="customerForm">

<input
type="text"
id="customerName"
placeholder="👤 Customer Name"
required>

<input
type="tel"
id="customerPhone"
placeholder="📞 Mobile Number"
required>

<input
type="email"
id="customerEmail"
placeholder="📧 Email Address">

<input
type="text"
id="customerAddress"
placeholder="📍 Address">

<input
type="number"
id="customerDue"
placeholder="💰 Total Due"
value="0"
min="0">

<input
type="number"
id="customerPaid"
placeholder="✅ Paid Amount"
value="0"
min="0">

<select
id="customerStatus">

<option value="Active">
🟢 Active
</option>

<option value="Inactive">
🔴 Inactive
</option>

</select>

<button
type="submit"
class="success-btn">

💾 Save Customer

</button>

</form>

<hr>
<h2>📊 Customer Statistics</h2>

<div class="dashboard-grid">

<div class="dashboard-card">

<h3>👥 Total Customers</h3>

<h2 id="totalCustomers">0</h2>

</div>

<div class="dashboard-card">

<h3>🟢 Active</h3>

<h2 id="activeCustomers">0</h2>

</div>

<div class="dashboard-card">

<h3>🔴 Inactive</h3>

<h2 id="inactiveCustomers">0</h2>

</div>

</div>

<hr>

<input
type="text"
id="searchCustomer"
class="search-box"
placeholder="🔍 Search Customer..."
onkeyup="searchCustomer()">

<br><br>

<div id="customerTable">

<div class="list-card">

<h3>👥 No Customer Found</h3>

<p>Add your first customer.</p>

</div>

</div>

<hr>
<div class="button-group">

<button
type="button"
class="primary-btn"
onclick="refreshCustomers()">

🔄 Refresh

</button>

<button
type="button"
class="primary-btn"
onclick="location.href='dashboard.html'">

🏠 Dashboard

</button>

<button
type="button"
class="primary-btn"
onclick="location.href='profile.html'">

👤 My Profile

</button>

<button
type="button"
class="danger-btn"
onclick="logoutUser()">

🚪 Logout

</button>

</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="common.js"></script>
<script src="customers.js"></script>
</body>

</html>
