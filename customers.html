<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Customers | BusinessOS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>👥 Customer Management</h1>

<p>Add, Edit & Manage Customers</p>

<hr>

<form id="customerForm">

<input
type="text"
id="customerName"
placeholder="👤 Customer Name"
required>

<input
type="tel"
id="customerPhone"
placeholder="📞 Mobile Number"
required>

<input
type="text"
id="customerAddress"
placeholder="📍 Address">

<input
type="number"
id="customerDue"
placeholder="💰 Total Due Amount"
value="0">

<input
type="number"
id="customerPaid"
placeholder="✅ Paid Amount"
value="0">

<button
type="submit"
class="success-btn">

💾 Save Customer

</button>

</form>

<hr>

<h2>👥 Customer List</h2>

<input
type="text"
id="searchCustomer"
class="search-box"
placeholder="🔍 Search Customer"
onkeyup="searchCustomer()">

<br><br>

<h3>

👥 Total Customers :
<span id="totalCustomers">0</span>

</h3>

<br>

<div id="customerTable">

<div class="list-card">

<h3>👤 No Customer Found</h3>

<p>Add your first customer.</p>

</div>

</div>

<br>

<button
type="button"
class="primary-btn"
onclick="location.href='index.html'">

🏠 Dashboard

</button>

</div>

<script src="common.js"></script>
<script src="customers.js"></script>

</body>

</html>
