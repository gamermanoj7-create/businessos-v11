<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BusinessOS - Purchase Order</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>📦 Purchase Order</h1>

<p>Create & Manage Purchase Orders</p>

<hr>

<form id="purchaseOrderForm">

<select
id="poSupplier"
required>

<option value="">
🏢 Select Supplier
</option>

</select>

<input
type="date"
id="poDate"
required>

<input
type="text"
id="poProduct"
placeholder="📦 Product Name"
required>

<input
type="number"
id="poQuantity"
placeholder="🔢 Quantity"
min="1"
required>

<input
type="number"
id="poUnitPrice"
placeholder="💰 Unit Price"
min="0"
step="0.01"
required>

<input
type="number"
id="poTotal"
placeholder="💵 Total Amount"
readonly>

<input
type="date"
id="deliveryDate">

<select
id="poStatus">

<option value="Pending">
🟡 Pending
</option>

<option value="Ordered">
📦 Ordered
</option>

<option value="Received">
✅ Received
</option>

<option value="Cancelled">
❌ Cancelled
</option>

</select>

<textarea
id="poNotes"
placeholder="📝 Notes"
rows="4"></textarea>

<br><br>

<button
type="submit"
class="success-btn">

💾 Save Purchase Order

</button>

</form>

<hr>

<h2>📦 Purchase Order List</h2>

<input
type="text"
id="searchPurchaseOrder"
class="search-box"
placeholder="🔍 Search Purchase Order"
onkeyup="searchPurchaseOrder()">

<br><br>

<h3>

📄 Total Orders :
<span id="totalPurchaseOrders">0</span>

</h3>

<h3>

💰 Total Purchase :
<span id="totalPurchaseAmount">₹0.00</span>

</h3>

<br>

<div id="purchaseOrderTable">

<div class="list-card">

<h3>📦 No Purchase Order Found</h3>

<p>Create your first Purchase Order.</p>

</div>

</div>

<hr>

<div class="button-group">

<button
type="button"
class="primary-btn"
onclick="refreshPurchaseOrders()">

🔄 Refresh

</button>

<button
type="button"
class="primary-btn"
onclick="location.href='supplier.html'">

🏢 Suppliers

</button>

<button
type="button"
class="primary-btn"
onclick="location.href='inventory.html'">

📦 Inventory

</button>

<button
type="button"
class="primary-btn"
onclick="location.href='reports.html'">

📊 Reports

</button>

<button
type="button"
class="success-btn"
onclick="location.href='index.html'">

🏠 Dashboard

</button>

</div>

</div>

<script src="common.js"></script>
<script src="purchaseorder.js"></script>

</body>

</html>
