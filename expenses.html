<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expenses | BusinessOS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>💸 Expense Management</h1>

<p>Add, Edit & Manage Business Expenses</p>

<hr>

<form id="expenseForm">

<input
type="text"
id="expenseName"
placeholder="💸 Expense Name"
required>

<input
type="number"
id="expenseAmount"
placeholder="💰 Amount (₹)"
required>

<input
type="text"
id="expenseCategory"
placeholder="📂 Category">

<input
type="date"
id="expenseDate">

<button
type="submit"
class="success-btn">

💾 Save Expense

</button>

</form>

<hr>

<h2>📋 Expense List</h2>

<input
type="text"
id="searchExpense"
class="search-box"
placeholder="🔍 Search Expense"
onkeyup="searchExpense()">

<br><br>

<h3>

💰 Total Expense :
<span id="totalExpense">₹0.00</span>

</h3>

<br>

<div id="expenseTable">

<div class="list-card">

<h3>💸 No Expense Found</h3>

<p>Add your first expense.</p>

</div>

</div>

<br>

<button
type="button"
class="primary-btn"
onclick="location.href='index.html'">

🏠 Dashboard

</button>

</div>

<script src="common.js"></script>
<script src="expenses.js"></script>

</body>

</html>
