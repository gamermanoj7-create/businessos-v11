<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Inventory | BusinessOS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>📦 Inventory Management</h1>

<p>BusinessOS Smart Inventory System</p>

<hr>

<h2>📊 Inventory Summary</h2>

<div class="dashboard-grid">

<div class="dashboard-card">

<h3>Total Products</h3>

<h2 id="inventoryProducts">0</h2>

</div>

<div class="dashboard-card">

<h3>Total Stock</h3>

<h2 id="inventoryStock">0</h2>

</div>

<div class="dashboard-card">

<h3>Low Stock</h3>

<h2 id="inventoryLowStock">0</h2>

</div>

<div class="dashboard-card">

<h3>Inventory Value</h3>

<h2 id="inventoryValue">₹0.00</h2>

</div>

</div>

<hr>

<h2>📦 Product Inventory</h2>

<input
type="text"
id="searchInventory"
class="search-box"
placeholder="🔍 Search Product"
onkeyup="searchInventory()">

<br><br>

<div id="inventoryTable">

<div class="list-card">

<h3>📦 No Product Found</h3>

<p>Add your first product.</p>

</div>

</div>

<hr>

<div class="button-group">

<button
type="button"
class="primary-btn"
onclick="refreshInventory()">

🔄 Refresh

</button>

<button
type="button"
class="primary-btn"
onclick="checkLowStock()">

⚠️ Check Low Stock

</button>

<button
type="button"
class="success-btn"
onclick="location.href='index.html'">

🏠 Dashboard

</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="common.js"></script>
<script src="inventory.js"></script>

</body>

</html>
