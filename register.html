<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BusinessOS V12 - Register</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<div class="auth-card">

<h1>📝 Create Account</h1>

<p>Create your BusinessOS account</p>

<form id="registerForm">

<div class="form-group">

<label>

👤 Full Name

</label>

<input
type="text"
id="fullName"
placeholder="Enter Full Name"
required>

</div>

<div class="form-group">

<label>

🏢 Business Name

</label>

<input
type="text"
id="businessName"
placeholder="Enter Business Name"
required>

</div>

<div class="form-group">

<label>

📱 Phone Number

</label>

<input
type="tel"
id="phone"
placeholder="Enter Phone Number"
required>

</div>
<div class="form-group">

<label>

📧 Email Address

</label>

<input
type="email"
id="email"
placeholder="Enter Email Address"
required>

</div>

<div class="form-group">

<label>

🔒 Password

</label>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

</div>

<div class="form-group">

<label>

🔑 Confirm Password

</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

</div>

<div class="form-group">

<label>

👑 Select Role

</label>

<select
id="role"
required>

<option value="">

Select Role

</option>

<option value="Admin">

👑 Admin

</option>

<option value="Manager">

🧑‍💼 Manager

</option>

<option value="Staff">

👨‍💼 Staff

</option>

</select>

</div>
<button
type="submit"
class="primary-btn">

✅ Create Account

</button>

<div class="login-links">

<p>

Already have an account?

<a href="login.html">

Login Here

</a>

</p>

<br>

<button
type="button"
class="success-btn"
onclick="location.href='login.html'">

🔑 Back to Login

</button>

</div>

</form>

</div>

</div>
<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<!-- BusinessOS Scripts -->

<script src="firebase.js"></script>

<script src="common.js"></script>

<script src="register.js"></script>

</body>

</html>
