<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BusinessOS V11 - Forgot Password</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="login-card">

<h1>🔑 Forgot Password</h1>

<p>Reset Your BusinessOS Account Password</p>

<hr>

<form id="forgotPasswordForm">

<input
type="email"
id="resetEmail"
placeholder="📧 Enter Your Email Address"
required>

<br><br>

<button
type="submit"
id="resetButton"
class="success-btn">

📧 Send Reset Link

</button>

</form>

<hr>

<div class="list-card">

<div class="list-item">

<span class="list-label">

📨 Reset Status

</span>

<span
id="resetStatus"
class="list-value">

Ready

</span>

</div>

<div class="list-item">

<span class="list-label">

⏳ Resend Timer

</span>

<span
id="countdownText"
class="list-value">

60s

</span>

</div>

<div class="list-item">

<span class="list-label">

🌐 Network

</span>

<span
id="networkStatus"
class="list-value">

🟢 Online

</span>

</div>

</div>

<hr>

<div class="button-group">

<button
type="button"
class="primary-btn"
onclick="sendResetLink()">

📧 Send Again

</button>

<button
type="button"
class="primary-btn"
onclick="resendResetLink()">

🔄 Resend Link

</button>

<button
type="button"
class="primary-btn"
onclick="retryReset()">

♻️ Retry

</button>

<button
type="button"
class="success-btn"
onclick="location.href='login.html'">

🔓 Back to Login

</button>

</div>

<hr>

<div class="button-group">

<button
type="button"
class="primary-btn"
onclick="location.reload()">

🔄 Refresh

</button>

<button
type="button"
class="primary-btn"
onclick="location.href='register.html'">

📝 Create Account

</button>

</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="firebase.js"></script>
<script src="common.js"></script>
<script src="forgotpassword.js"></script>

</body>

</html>
